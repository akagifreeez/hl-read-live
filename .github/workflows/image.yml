# Build the container image and publish it to ghcr.io.
#
# This half of the pipeline only produces an image. It deliberately does not
# deploy: the manifests live in a Forgejo instance on the home network that
# GitHub cannot reach. Argo CD Image Updater, which runs inside the cluster,
# watches this registry and writes the new tag back to Forgejo — that is where
# build meets deploy.
name: image

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'k8s/**'
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The built-in GITHUB_TOKEN can push to ghcr with this, so the workflow
      # needs no personal access token and no stored secret.
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          # A monotonic, immutable tag per commit. Image Updater sorts on it,
          # and `latest` alone would give it nothing to compare.
          tags: |
            type=raw,value=0.1.{{date 'YYYYMMDDHHmmss'}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: |
          echo "### Pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
